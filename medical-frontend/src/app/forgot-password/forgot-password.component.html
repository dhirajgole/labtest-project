<div class="forgot-page">
  <div class="forgot-container">
    <h1>Forgot Password</h1>
    <p class="subtitle">Enter your registered email to receive a password reset link.</p>

    <form #forgotForm="ngForm" (ngSubmit)="submit()" novalidate>
      <input
        type="email"
        name="email"
        placeholder="Enter your email"
        required
        email
        [(ngModel)]="email"
        #emailModel="ngModel"
      />

      <div class="error" *ngIf="emailModel.invalid && emailModel.touched">
        Please enter a valid email.
      </div>

      <button type="submit" [disabled]="forgotForm.invalid || loading">
        {{ loading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>

    <div class="success-message" *ngIf="message">
      {{ message }}
    </div>

    <div class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="footer">
      Remember password?
      <a (click)="goToLogin()">Log In</a>
    </div>
  </div>
</div>
